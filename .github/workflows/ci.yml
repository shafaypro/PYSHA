name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: MyPy (core only)
        run: mypy src/pysha/core src/pysha/config.py src/pysha/app.py
        continue-on-error: true

      - name: Pytest
        run: pytest -q
